<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title data-i18n="pageTitle">LayerPitch</title>
<style>

  .video-card {

  .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; }

<!-- Décodeur Ogg Vorbis de secours (Safari/iOS, qui ne sait pas décoder l'Ogg nativement) — chargé en
     differé, n'est utilisé que si le décodage natif échoue, voir decodeAudioDataCompat dans player.js -->
<script defer src="https://unpkg.com/@wasm-audio-decoders/ogg-vorbis/dist/ogg-vorbis-decoder.min.js"></script>
<script src="layerpitch-i18n.js"></script>
<script src="player.js?v=1784392640474"></script>
<script>
const { section, escapeHtml, linkify, renderTracksBlock, setupContrastToggle } = window.LayerPlayerCore;

// Traductions de l'habillage LayerPitch (pas le contenu des AdReels/morceaux, qui reste dans sa langue
// d'origine). Vit dans layerpitch-i18n.js (zones "shared" + "index"), édité via l'outil dédié.
// Langue fixée par le compositeur pour cet AdReel (champ adReel.lang dans data.json), jamais par le
// visiteur — déterminée une fois l'AdReel trouvé, voir init(). 'fr' tant que rien n'est encore connu.
let pageLang = 'fr';
function currentLang() { return pageLang; }
// tr('clé') pour le texte généré en JS ; data-i18n pour le HTML statique. Un même dictionnaire pour les
// deux. Ordre de repli : zone index -> zone shared -> même chose en français -> la clé elle-même.
function tr(key) {
  const I18N = window.LAYERPITCH_I18N || { fr: { shared: {}, index: {} }, en: { shared: {}, index: {} } };
  const dict = I18N[currentLang()] || I18N.fr;
  const dictFr = I18N.fr;
  return (dict.index && dict.index[key]) || (dict.shared && dict.shared[key])
    || (dictFr.index && dictFr.index[key]) || (dictFr.shared && dictFr.shared[key]) || key;
}
function applyI18n() {
  document.documentElement.lang = currentLang();
  document.querySelectorAll('[data-i18n]').forEach(el => { const v = tr(el.dataset.i18n); if (v) el.textContent = v; });
}

// Même petit repère que dans player.js — dupliqué ici car ce script inline est un fichier séparé,
// sans accès direct à l'intérieur de la fonction IIFE de player.js.
// Contexte déposé sur window.__lpTrackContext une fois l'AdReel identifié plus bas — voir player.js
// pour l'explication complète du mécanisme.
function trackPublicEvent(name, detail) {
  try {
    if (!window.umami) return;
    const ctx = window.__lpTrackContext || {};
    window.umami.track(name, Object.assign({}, detail, ctx.type ? { [ctx.type]: ctx.id } : {}));
  } catch (e) { /* jamais bloquant */ }
}

function genId() { return 'b' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ---------------- Migration (anciens formats de data.json) ---------------- */
function migrateBlocks(data) {
  let blocks = data.blocks;
  if (!Array.isArray(blocks) || blocks.length === 0 || typeof blocks[0] !== 'object') {
    const legacy = Array.isArray(blocks) ? blocks : ['header', 'testimonials', 'videos', 'gallery', 'bio', 'tracks'];
    const out = [];
    legacy.forEach(type => {
      const t = type === 'photo' ? 'gallery' : type;
      if (t === 'gallery') out.push({ id: genId(), type: 'photo', align: 'left', images: (data.gallery || []).map(g => ({ file: g.file })) });
      else if (t === 'videos') out.push({ id: genId(), type: 'video', videos: (data.videos || []).map(v => ({ title: v.title, url: v.url })) });
      else if (['header', 'bio', 'testimonials', 'tracks'].includes(t)) out.push({ id: genId(), type: t });
    });
    blocks = out;
  }
  blocks.forEach(b => {
    if (b.type === 'photo' && !b.images) b.images = b.file ? [{ file: b.file }] : [];
    if (b.type === 'video' && !b.videos) b.videos = (b.title || b.url) ? [{ title: b.title || '', url: b.url || '' }] : [];
  });
  ['header', 'testimonials', 'tracks'].forEach(t => {
    if (!blocks.some(b => b.type === t)) blocks.push({ id: genId(), type: t });
  });
  return blocks;
}

/* ---------------- Blocs ---------------- */
function renderHeaderBlock(container, profile) {
  const el = document.createElement('div');
  el.className = 'header';
  el.innerHTML = `
    ${profile.logo ? `<img class="logo-img" src="./images/${profile.logo}" alt="${tr('logoAlt')}">` : `<div class="logo-fallback">LayerPitch</div>`}
    ${profile.tagline ? `<div class="logo-tag">${escapeHtml(profile.tagline)}</div>` : ''}
  `;
  container.appendChild(el);
}
function renderBioBlock(container, profile) {
  if (!profile.bio && !profile.photo) return;
  const textHtml = (profile.bio || '').split('\n\n').map(p => `<p>${linkify(p)}</p>`).join('');
  const photoHtml = profile.photo
    ? `<div class="bio-photo"><img src="./images/${profile.photo}" alt="${tr('photoAlt')}"></div>`
    : `<div class="bio-photo empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg></div>`;
  container.appendChild(section(tr('aboutSection'), `<div class="bio">${photoHtml}<div class="bio-text">${textHtml}</div></div>`));
}
function renderTestimonialsBlock(container, list) {
  if (!list || list.length === 0) return;
  const inner = list.map(t => `<div class="testimonial"><p>« ${linkify(t.text)} »</p><cite>${escapeHtml(t.author)}</cite></div>`).join('');
  container.appendChild(section(tr('testimonialsSection'), inner));
}
function renderTextBlockItem(container, block) {
  if (!block.content) return;
  const align = ['left', 'center', 'right'].includes(block.align) ? block.align : 'left';
  const html = block.content.split('\n\n').map(p => `<p>${linkify(p)}</p>`).join('');
  const el = document.createElement('div');
  el.className = 'block text-block';
  el.style.textAlign = align;
  el.innerHTML = html;
  container.appendChild(el);
}
function renderPhotoBlockItem(container, block) {
  if (!block.images || block.images.length === 0) return;
  const align = block.align === 'center' ? 'center' : block.align === 'right' ? 'flex-end' : 'flex-start';
  const el = document.createElement('div');
  el.className = 'block';
  if (block.images.length === 1) {
    el.innerHTML = `<div class="photo-block-single" style="justify-content:${align}"><img src="./images/${block.images[0].file}" alt=""></div>`;
  } else {
    const imgs = block.images.map(g => `<img src="./images/${g.file}" alt="">`).join('');
    el.innerHTML = `<div class="photo-grid">${imgs}</div>`;
  }
  container.appendChild(el);
}
function extractYouTubeId(url) {
  if (!url) return null;
  try {
    const u = new URL(url);
    const host = u.hostname.replace(/^www\./, '');
    if (host === 'youtu.be') {
      return u.pathname.slice(1).split('/')[0] || null;
    }
    if (host === 'youtube.com' || host === 'm.youtube.com' || host === 'music.youtube.com') {
      if (u.pathname === '/watch') return u.searchParams.get('v');
      if (u.pathname.startsWith('/embed/')) return u.pathname.split('/')[2] || null;
      if (u.pathname.startsWith('/shorts/')) return u.pathname.split('/')[2] || null;
    }
  } catch (e) { /* URL invalide, on ignore */ }
  return null;
}

function renderPacksBlockItem(container, block, packsById) {
  const selected = (block.packIds || []).map(id => packsById[id]).filter(Boolean);
  if (!selected.length) return;
  const el = section(tr('packsSection'), '');
  const list = document.createElement('div');
  list.className = 'packs-list';
  selected.forEach(p => {
    const a = document.createElement('a');
    a.className = 'packs-list-item';
    a.href = `./pack.html?id=${encodeURIComponent(p.id)}&lang=${pageLang}`;
    a.innerHTML = `<span class="packs-list-item-title">${escapeHtml(p.title)}</span><span class="packs-list-item-arrow">→</span>`;
    list.appendChild(a);
  });
  el.appendChild(list);
  container.appendChild(el);
}

function renderContactBlockItem(container, profile) {
  const endpoint = profile && profile.formspreeEndpoint && profile.formspreeEndpoint.trim();
  if (!endpoint) return; // pas configuré côté backstage : ce bloc ne s'affiche simplement pas
  const el = section(tr('contactSection'), '');
  el.innerHTML += `
    <form data-role="contactForm" class="contact-form">
      <label>${tr('formName')}</label>
      <input type="text" name="name" required>
      <label>${tr('formEmail')}</label>
      <input type="email" name="email" required>
      <label>${tr('formMessage')}</label>
      <textarea name="message" required rows="5"></textarea>
      <button type="submit" data-role="contactSubmit">${tr('send')}</button>
      <div class="contact-form-status" data-role="contactStatus"></div>
    </form>
  `;
  container.appendChild(el);
  const form = el.querySelector('[data-role="contactForm"]');
  const submitBtn = el.querySelector('[data-role="contactSubmit"]');
  const statusEl = el.querySelector('[data-role="contactStatus"]');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    statusEl.textContent = tr('sending');
    statusEl.className = 'contact-form-status';
    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { Accept: 'application/json' },
        body: new FormData(form)
      });
      if (res.ok) {
        trackPublicEvent('contact_submit', {});
        form.innerHTML = `<div class="contact-form-status success">${tr('sent')}</div>`;
      } else {
        const data = await res.json().catch(() => ({}));
        statusEl.textContent = (data.errors && data.errors.map(er => er.message).join(', ')) || tr('genericError');
        statusEl.className = 'contact-form-status error';
        submitBtn.disabled = false;
      }
    } catch (err) {
      statusEl.textContent = tr('networkError');
      statusEl.className = 'contact-form-status error';
      submitBtn.disabled = false;
    }
  });
}

function renderVideoBlockItem(container, block) {
  if (!block.videos || block.videos.length === 0) return;
  const makeCard = (v) => {
    const ytId = extractYouTubeId(v.url);
    const thumbUrl = v.thumbnail ? `./images/${v.thumbnail}` : (ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : null);
    const bg = thumbUrl ? `background-image:url('${thumbUrl}'); background-size:cover; background-position:center;` : '';

    if (ytId) {
      // Vignette cliquable : la vidéo YouTube ne se charge (iframe) qu'au clic — plus rapide et plus respectueux
      // de la vie privée du visiteur que d'intégrer YouTube dès l'affichage de la page.
      const card = document.createElement('div');
      card.className = 'video-card';
      card.style.cssText = bg;
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.innerHTML = `<div class="vt">${escapeHtml(v.title || '')}</div><div class="play-dot"></div>`;
      const activate = () => {
        const iframe = document.createElement('iframe');
        iframe.className = 'video-embed-frame';
        iframe.src = `https://www.youtube-nocookie.com/embed/${ytId}?autoplay=1&rel=0`;
        iframe.title = v.title || tr('videoFallbackTitle');
        iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
        iframe.allowFullscreen = true;
        card.replaceWith(iframe);
      };
      card.addEventListener('click', activate, { once: true });
      card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); activate(); } }, { once: true });
      return card;
    }

    // Repli : URL non reconnue comme YouTube (Vimeo, autre) -> comportement existant, lien externe.
    const hasUrl = !!v.url;
    const el = document.createElement(hasUrl ? 'a' : 'div');
    el.className = 'video-card' + (hasUrl ? '' : ' disabled');
    el.style.cssText = bg;
    if (hasUrl) { el.href = v.url; el.target = '_blank'; el.rel = 'noopener'; }
    el.innerHTML = `<div class="vt">${escapeHtml(v.title || '')}</div>${hasUrl ? '<div class="play-dot"></div>' : ''}`;
    return el;
  };
  const makeItem = (v) => {
    const wrap = document.createElement('div');
    wrap.className = 'video-item';
    wrap.appendChild(makeCard(v));
    if (v.comment && v.comment.trim()) {
      const p = document.createElement('div');
      p.className = 'video-comment';
      p.textContent = v.comment;
      wrap.appendChild(p);
    }
    return wrap;
  };
  const el = document.createElement('div');
  el.className = 'block';
  if (block.videos.length === 1) {
    el.appendChild(makeItem(block.videos[0]));
  } else {
    const grid = document.createElement('div');
    grid.className = 'video-grid-multi';
    block.videos.forEach(v => grid.appendChild(makeItem(v)));
    el.appendChild(grid);
  }
  container.appendChild(el);
}
// Applique les surcharges de texte propres à cet AdReel (titre/description/labels de couche/labels de
// stinger) par-dessus le morceau tel qu'il vit dans la Bibliothèque — sans jamais modifier ce dernier.
// Absent = le texte de la Bibliothèque reste affiché tel quel.
function applyTrackOverride(track, ov) {
  if (!ov) return track;
  const merged = { ...track };
  if (ov.title !== undefined) merged.title = ov.title;
  if (ov.description !== undefined) merged.description = ov.description;
  if (ov.layers && Object.keys(ov.layers).length) {
    const key = track.mode === 'vertical-random' ? 'fixedLayers' : 'layers';
    merged[key] = (track[key] || []).map((l, i) => (ov.layers[i] !== undefined ? { ...l, label: ov.layers[i] } : l));
  }
  if (ov.stingers && Object.keys(ov.stingers).length) {
    merged.stingers = (track.stingers || []).map((s, i) => (ov.stingers[i] !== undefined ? { ...s, label: ov.stingers[i] } : s));
  }
  return merged;
}
async function init() {
  const container = document.getElementById('blocksContainer');
  const adreelId = new URLSearchParams(location.search).get('adreel') || 'main';
  window.__lpTrackContext = { type: 'adreel', id: adreelId };
  try {
    const res = await fetch('./data.json?v=' + Date.now());
    const data = await res.json();
    const adReel = (data.adReels || []).find(a => a.id === adreelId);
    if (!adReel) {
      container.innerHTML = `<div class="empty">${tr('adreelNotFound')}</div>`;
      return;
    }
    pageLang = adReel.lang || 'fr';
    window.LayerPlayerCore.setLang(pageLang);
    applyI18n();
    const blocks = migrateBlocks(adReel);
    const profile = adReel.profile || {};
    if (profile.bgColor) document.documentElement.style.setProperty('--bg', profile.bgColor);
    if (profile.textColor) document.documentElement.style.setProperty('--text', profile.textColor);
    setupContrastToggle('contrastToggle', profile.bgColor, profile.textColor);

    const libraryById = {};
    (data.library || []).forEach(t => { t.publishedAt = data.publishedAt; libraryById[t.id] = t; });
    const packsByTrackId = {};
    (data.packs || []).forEach(p => {
      (p.trackIds || []).forEach(tid => {
        (packsByTrackId[tid] = packsByTrackId[tid] || []).push(p);
      });
    });
    const packsById = {};
    (data.packs || []).forEach(p => { packsById[p.id] = p; });

    blocks.forEach(block => {
      switch (block.type) {
        case 'header': renderHeaderBlock(container, profile); break;
        case 'bio': renderBioBlock(container, profile); break;
        case 'testimonials': renderTestimonialsBlock(container, adReel.testimonials); break;
        case 'text': renderTextBlockItem(container, block); break;
        case 'photo': renderPhotoBlockItem(container, block); break;
        case 'video': renderVideoBlockItem(container, block); break;
        case 'packs': renderPacksBlockItem(container, block, packsById); break;
        case 'contact': renderContactBlockItem(container, profile); break;
        case 'tracks': {
          const orderedTracks = (adReel.trackIds || []).map(id => libraryById[id]).filter(Boolean)
            .map(t => applyTrackOverride(t, (adReel.trackOverrides || {})[t.id]));
          renderTracksBlock(container, orderedTracks, packsByTrackId);
          break;
        }
      }
    });

    if (profile.contactUrl || profile.contactEmail) {
      document.getElementById('contact').innerHTML = [
        profile.contactUrl ? `<a href="${profile.contactUrl}" target="_blank">${profile.contactUrl.replace(/^https?:\/\//, '')}</a>` : '',
        profile.contactEmail ? `<a href="mailto:${profile.contactEmail}">${profile.contactEmail}</a>` : ''
      ].filter(Boolean).join(' &nbsp;/&nbsp; ');
    }
    document.getElementById('layerpitchCredit').textContent = tr('creditLine').replace('{label}', adReel.label || adReel.id);
  } catch (e) {
    container.innerHTML = `<div class="empty">${tr('loadError')}</div>`;
  }
}
window.addEventListener('load', init);
</script>
