<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="pageTitle">LayerPitch — Collection</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f6f5f3; --bg-card: #ffffff; --border: #e4e1da;
    --text: #262521; --text-dim: #6f6b62; --text-dimmer: #a8a399;
    --accent: #c9713c; --accent-soft: #f3e4d6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  img { max-width: 100%; height: auto; display: block; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 56px 24px 60px; }
  .page { max-width: 760px; margin: 0 auto; }
  a { color: var(--accent); }

  .back-link { display: inline-block; margin-bottom: 32px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dim); text-decoration: none; }
  .back-link:hover { color: var(--accent); }

  .pack-illustration { display: block; max-width: 100%; max-height: 380px; width: auto; height: auto; margin: 0 auto 28px; border-radius: 8px; border: 1px solid var(--border); }
  .pack-illustration.empty { width: 100%; max-height: none; aspect-ratio: 16/7; background: linear-gradient(135deg, #2a2822, #423b30); }

  .pack-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 28px; margin-bottom: 16px; }
  .pack-presentation p { font-size: 14.5px; line-height: 1.7; color: var(--text-dim); margin-bottom: 14px; white-space: pre-wrap; }

  .section-label {
    font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 18px; margin-top: 48px;
  }

  /* Liste des packs inclus — vignette + titre, cliquable. Même logique de vignette que le futur bloc
     "Packs" d'un AdReel (cf. thumbnailOf), pour une cohérence visuelle partout où des packs sont listés. */
  .collection-pack-list { display: flex; flex-direction: column; gap: 2px; }
  .collection-pack-row {
    display: flex; align-items: center; gap: 14px; padding: 12px 4px; text-decoration: none; color: inherit;
    border-bottom: 1px solid var(--border);
  }
  .collection-pack-row:hover .collection-pack-row-title { color: var(--accent); }
  .collection-pack-thumb { width: 52px; height: 52px; border-radius: 6px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }
  .collection-pack-thumb.empty { background: linear-gradient(135deg, #2a2822, #423b30); }
  .collection-pack-row-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; transition: color 0.15s ease; }

  .empty { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-dimmer); padding: 60px 0; text-align: center; }
  .layerpitch-credit { margin-top: 56px; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dimmer); text-align: center; }
  .contrast-toggle { display: flex; align-items: center; gap: 6px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-dimmer); margin-top: 40px; cursor: pointer; }
  .contrast-toggle input { width: auto; }
</style>
</head>
<body>
<div class="page">
  <a class="back-link" href="./index.html" data-i18n="backLink">← Retour</a>
  <div id="content"></div>
  <label class="contrast-toggle"><input type="checkbox" id="contrastToggle"> <span data-i18n="highContrast">Contraste renforcé</span></label>
</div>

<script src="layerpitch-i18n.js"></script>
<script src="layerpitch-help.js"></script>
<script src="player.js"></script>
<script>
// Langue transmise par l'AdReel/pack qui a mené ici (paramètre ?lang= dans le lien), jamais choisie par
// le visiteur — même principe que pack.html.
const pageLang = new URLSearchParams(location.search).get('lang') === 'en' ? 'en' : 'fr';
function currentLang() { return pageLang; }
function pickBilingualText(fr, en) {
  return (pageLang === 'en' ? (en || fr) : (fr || en)) || '';
}
// tr('clé') pour le texte généré en JS ; data-i18n pour le HTML statique. Zone "collection" -> zone
// "shared" -> même chose en français -> la clé elle-même.
function tr(key) {
  const I18N = window.LAYERPITCH_I18N || { fr: { shared: {}, collection: {} }, en: { shared: {}, collection: {} } };
  const dict = I18N[currentLang()] || I18N.fr;
  const dictFr = I18N.fr;
  return (dict.collection && dict.collection[key]) || (dict.shared && dict.shared[key])
    || (dictFr.collection && dictFr.collection[key]) || (dictFr.shared && dictFr.shared[key]) || key;
}
function applyI18n() {
  document.documentElement.lang = currentLang();
  document.querySelectorAll('[data-i18n]').forEach(el => { const v = tr(el.dataset.i18n); if (v) el.textContent = v; });
}
window.LayerPlayerCore.setLang(pageLang);
applyI18n();

// Umami (analytics) — même principe que pack.html/index.html, dupliqué à l'identique (chaque script a sa
// propre closure). Jamais bloquant, silencieux si Umami n'est pas chargé.
function trackPublicEvent(name, detail) {
  try {
    if (window.umami && typeof window.umami.track === 'function') {
      window.umami.track(name, Object.assign({}, detail, window.__lpTrackContext || {}));
    }
  } catch (e) { /* silencieux */ }
}

async function init() {
  const container = document.getElementById('content');
  const id = new URLSearchParams(location.search).get('id');
  window.__lpTrackContext = { type: 'collection', id: id };
  try {
    const res = await fetch('./data.json?v=' + Date.now());
    const data = await res.json();
    const collection = (data.collections || []).find(c => c.id === id);
    setupContrastToggle('contrastToggle');
    if (!collection) {
      container.innerHTML = `<div class="empty">${tr('collectionNotFound')}</div>`;
      return;
    }
    const packsById = {};
    (data.packs || []).forEach(p => { packsById[p.id] = p; });
    const includedPacks = (collection.packIds || []).map(pid => packsById[pid]).filter(Boolean);

    container.innerHTML = `
      ${collection.illustration ? `<img class="pack-illustration" src="./images/${collection.illustration}" alt="">` : `<div class="pack-illustration empty"></div>`}
      <div class="pack-title">${escapeHtml(collection.title)}</div>
      <div class="pack-presentation">${pickBilingualText(collection.presentationFr, collection.presentationEn).split('\n\n').map(p => `<p>${linkify(p)}</p>`).join('')}</div>
      <div class="section-label">${tr('packsInCollectionLabel')}</div>
      <div class="collection-pack-list">
        ${includedPacks.length ? includedPacks.map(p => `
          <a class="collection-pack-row" href="./pack.html?id=${encodeURIComponent(p.id)}&lang=${pageLang}">
            ${p.illustration ? `<img class="collection-pack-thumb" src="./images/${p.illustration}" alt="">` : `<div class="collection-pack-thumb empty"></div>`}
            <span class="collection-pack-row-title">${escapeHtml(p.title)}</span>
          </a>
        `).join('') : `<div class="empty">${tr('noPacksInCollectionYet')}</div>`}
      </div>
    `;

    const credit = document.createElement('div');
    credit.className = 'layerpitch-credit';
    credit.textContent = tr('creditLine').replace('{title}', collection.title);
    document.getElementById('content').appendChild(credit);
  } catch (e) {
    container.innerHTML = `<div class="empty">${tr('loadError')}</div>`;
  }
}
window.addEventListener('load', init);
</script>
</body>
</html>
